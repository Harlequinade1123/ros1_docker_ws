services:
  ros:
    build:
      context: .
      dockerfile: Dockerfile
    image: ros1_noetic_ws:latest
    container_name: ros1_ws

    # ── Volumes ──────────────────────────────────────────────────
    volumes:
      - ../catkin_ws:/home/ros/catkin_ws         # source managed on host
      - ../bags:/home/ros/bags                    # rosbag storage
      - /tmp/.X11-unix:/tmp/.X11-unix:rw         # X11 GUI forwarding
      - /dev:/dev                                # share all devices (hot-plug supported)
      - /run/udev:/run/udev:ro                   # udev events for device auto-detection

    # ── Environment ──────────────────────────────────────────────
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - ROS_MASTER_URI=http://localhost:11311
      - ROS_HOSTNAME=localhost

    # ── Network ──────────────────────────────────────────────────
    network_mode: host

    # ── Permissions ──────────────────────────────────────────────
    # privileged: true enables:
    #   - hot-plug USB device recognition
    #   - CAN interface up/down/bitrate configuration
    #   - access to gamepad, camera, serial, and all other devices
    privileged: true

    stdin_open: true
    tty: true
    working_dir: /home/ros/catkin_ws

    # ── GPU support (optional) ────────────────────────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

