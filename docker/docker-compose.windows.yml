# Windows docker-compose
# Differences from docker-compose.yml:
#   - network_mode: host → bridge network (host mode not supported on Windows Docker)
#   - No X11 Unix socket → TCP connection to VcXsrv (DISPLAY=host.docker.internal:0.0)
#   - No /dev:/dev → USB devices passed through individually via usbipd-win
#   - No /run/udev

services:
  ros:
    build:
      context: .
      dockerfile: Dockerfile
    image: ros1_noetic_ws:latest
    container_name: ros1_ws

    volumes:
      - ../catkin_ws:/home/ros/catkin_ws   # source managed on host
      - ../bags:/home/ros/bags              # rosbag storage
      # Joystick: enable after attaching via usbipd-win (WSL2 exposes /dev/input)
      # Comment out if no joystick is connected
      - /dev/input:/dev/input              # joystick (after usbipd-win attach)

    # To pass through a USB serial device, enable the lines below
    # (device must be attached via usbipd-win first)
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0        # serial (CH340, FTDI, etc.)
    #   - /dev/ttyACM0:/dev/ttyACM0        # CDC ACM (Arduino, etc.)

    environment:
      - DISPLAY=host.docker.internal:0.0   # VcXsrv on Windows host
      - QT_X11_NO_MITSHM=1
      - ROS_MASTER_URI=http://localhost:11311
      - ROS_HOSTNAME=localhost

    # bridge network required on Windows (host mode not supported)
    networks:
      - ros_net

    extra_hosts:
      - "host.docker.internal:host-gateway"

    stdin_open: true
    tty: true
    working_dir: /home/ros/catkin_ws

    # GPU support (optional — requires NVIDIA GPU + nvidia-container-toolkit on host)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

networks:
  ros_net:
    driver: bridge
